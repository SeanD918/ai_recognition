services:
  - type: web
    name: gender-ai-backend
    env: docker
    region: oregon
    plan: free
    dockerContext: .
    dockerfilePath: ai_models/gender-ai/Dockerfile
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10000

  - type: web
    name: animal-ai-backend
    env: docker
    region: oregon
    plan: free
    dockerContext: .
    dockerfilePath: ai_models/animal-ai/Dockerfile
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10001
