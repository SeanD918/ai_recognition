services:
  - type: web
    name: gender-ai-backend
    env: docker
    region: oregon
    plan: free
    rootDir: ai_models/gender-ai
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10000

  - type: web
    name: animal-ai-backend
    env: docker
    region: oregon
    plan: free
    rootDir: ai_models/animal-ai
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10001

  - type: web
    name: flower-ai-backend
    env: docker
    region: oregon
    plan: free
    rootDir: ai_models/flower-ai
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10002

  - type: web
    name: hand-ai-backend
    env: docker
    region: oregon
    plan: free
    rootDir: ai_models/hand-ai
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10003

  - type: web
    name: ai-recognition-gateway
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GENDER_API_URL
        value: https://gender-ai-backend.onrender.com
      - key: ANIMAL_API_URL
        value: https://animal-ai-backend.onrender.com
      - key: FLOWER_API_URL
        value: https://flower-ai-backend.onrender.com
      - key: HAND_API_URL
        value: https://hand-ai-backend.onrender.com

